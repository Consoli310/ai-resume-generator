spring:
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}

gemini:
    api-key: ${APP_GEMINI_API_KEY}
    model: gemini-2.5-flash
    fallback-model: gemini-2.5-flash-lite
    url: https://generativelanguage.googleapis.com

jwt:
    secret: ${JWT_SECRET}